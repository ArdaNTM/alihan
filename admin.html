<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ares Sigorta - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-xl p-6">
        <h1 class="text-3xl font-bold mb-6 text-primary">Gelen Teklif Talepleri</h1>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-3">Tarih</th>
                        <th class="p-3">Ad Soyad</th>
                        <th class="p-3">Telefon</th>
                        <th class="p-3">Sigorta Türü</th>
                        <th class="p-3">Detaylar</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://kruafohztdgemqyaamyk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtydWFmb2h6dGRnZW1xeWFhbXlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQzNjMsImV4cCI6MjA5MTkyMDM2M30.ur3o3yD5yhccLKzY1jftZ4FVQILbyKCub4tYySrfElM');
        async function fetchLeads() {
            const { data, error } = await supabase.from('teklifler').select('*').order('olusturulma_tarihi', { ascending: false });
            if(data) {
                const body = document.getElementById('adminTableBody');
                body.innerHTML = data.map(item => `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 text-sm">${new Date(item.olusturulma_tarihi).toLocaleString('tr-TR')}</td>
                        <td class="p-3 font-bold">${item.ad_soyad}</td>
                        <td class="p-3">${item.telefon}</td>
                        <td class="p-3"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">${item.sigorta_turu}</span></td>
                        <td class="p-3 text-xs">${JSON.stringify(item.detaylar)}</td>
                    </tr>
                `).join('');
            }
        }
        fetchLeads();
    </script>
</body>
</html>
