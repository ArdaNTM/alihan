<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ares Sigorta - Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold"><i class="fas fa-cogs mr-2"></i> Yönetim Paneli</h1>
                <p class="text-blue-200 text-sm mt-1">Üyelerin görev onay taleplerini buradan yönetebilirsiniz.</p>
            </div>
            <button onclick="talepleriGetir()" class="bg-white text-blue-800 px-4 py-2 rounded font-bold hover:bg-gray-100 transition shadow">
                <i class="fas fa-sync-alt mr-1"></i> Yenile
            </button>
        </div>
        
        <div class="p-6 overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-100 text-gray-700 uppercase text-sm border-b-2 border-gray-200">
                        <th class="p-4 rounded-tl-lg">Tarih</th>
                        <th class="p-4">Kullanıcı Bilgisi</th>
                        <th class="p-4">Görev Adı</th>
                        <th class="p-4 text-center rounded-tr-lg">İşlem (Çark Hakkı Ver)</th>
                    </tr>
                </thead>
                <tbody id="onayTablosu">
                    <tr>
                        <td colspan="4" class="p-8 text-center text-gray-500">Yükleniyor...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Supabase Bağlantısı (Senin anahtarların)
        const SUPABASE_URL = 'https://kruafohztdgemqyaamyk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtydWFmb2h6dGRnZW1xeWFhbXlrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQzNjMsImV4cCI6MjA5MTkyMDM2M30.ur3o3yD5yhccLKzY1jftZ4FVQILbyKCub4tYySrfElM';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Sadece durumu "Bekliyor" olan talepleri getirir
        async function talepleriGetir() {
            const tbody = document.getElementById('onayTablosu');
            
            const { data, error } = await supabase
                .from('gorev_talepleri')
                .select('*')
                .eq('durum', 'Bekliyor')
                .order('olusturulma_tarihi', { ascending: false });
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">Veriler çekilirken hata oluştu: ${error.message}</td></tr>`;
                return;
            }

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500 text-lg"><i class="fas fa-check-circle text-green-500 mr-2"></i> Onay bekleyen yeni görev bulunmuyor.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = data.map(talep => {
                const tarih = new Date(talep.olusturulma_tarihi).toLocaleString('tr-TR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                return `
                    <tr class="border-b hover:bg-gray-50 transition" id="talep-${talep.id}">
                        <td class="p-4 text-sm text-gray-600 whitespace-nowrap">${tarih}</td>
                        <td class="p-4">
                            <div class="font-bold text-gray-800">${talep.ad_soyad}</div>
                            <div class="text-sm text-gray-500">${talep.kullanici_email}</div>
                        </td>
                        <td class="p-4 font-medium text-blue-700">${talep.gorev_adi}</td>
                        <td class="p-4 text-center whitespace-nowrap">
                            <button onclick="goreviOnayla(${talep.id}, '${talep.kullanici_email}')" class="bg-green-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-green-600 shadow transition mr-2">
                                <i class="fas fa-check"></i> Onayla
                            </button>
                            <button onclick="goreviReddet(${talep.id})" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-600 shadow transition">
                                <i class="fas fa-times"></i> Reddet
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Görevi Onaylama ve Çark Hakkı Verme Fonksiyonu
        async function goreviOnayla(talepId, email) {
            const btnDiv = event.target.closest('td');
            btnDiv.innerHTML = '<span class="text-green-600 font-bold"><i class="fas fa-spinner fa-spin"></i> İşleniyor...</span>';

            // 1. Talebin durumunu "Onaylandı" yap (Listeden düşer)
            await supabase.from('gorev_talepleri').update({ durum: 'Onaylandı' }).eq('id', talepId);
            
            // 2. Kullanıcının mevcut çark hakkını bul
            const { data: hakData } = await supabase.from('kullanici_haklari').select('kalan_hak').eq('email', email).single();
            const mevcutHak = hakData ? hakData.kalan_hak : 0;
            
            // 3. Hakkı +1 artır ve veritabanına yaz
            await supabase.from('kullanici_haklari').upsert({ email: email, kalan_hak: mevcutHak + 1 });
            
            // Ekrandan o satırı gizle
            document.getElementById('talep-' + talepId).style.display = 'none';
            
            // Onay mesajı (İsteğe bağlı kapatabilirsin)
            // alert("Görev başarıyla onaylandı! Üyeye 1 adet çark çevirme hakkı eklendi.");
        }

        // Görevi Reddetme Fonksiyonu
        async function goreviReddet(talepId) {
            if(!confirm("Bu görevi reddetmek istediğinize emin misiniz?")) return;
            
            const btnDiv = event.target.closest('td');
            btnDiv.innerHTML = '<span class="text-red-600 font-bold"><i class="fas fa-spinner fa-spin"></i> Reddediliyor...</span>';

            await supabase.from('gorev_talepleri').update({ durum: 'Reddedildi' }).eq('id', talepId);
            document.getElementById('talep-' + talepId).style.display = 'none';
        }

        // Sayfa açıldığında talepleri yükle
        window.addEventListener('DOMContentLoaded', talepleriGetir);
    </script>
</body>
</html>
